name: Build

on:
  push:
    tags: ['v*']

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Inject TMDB API key
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: |
          $key = $env:TMDB_API_KEY
          (Get-Content main.py -Raw).Replace('_BUILTIN_TMDB_KEY = ""', "_BUILTIN_TMDB_KEY = `"$key`"") | Set-Content main.py -NoNewline

      - name: Build
        run: pyinstaller watchnext.spec

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/WatchNext.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Inject TMDB API key
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: |
          python -c "
          import os
          key = os.environ['TMDB_API_KEY']
          with open('main.py', 'r') as f: content = f.read()
          content = content.replace('_BUILTIN_TMDB_KEY = \"\"', f'_BUILTIN_TMDB_KEY = \"{key}\"')
          with open('main.py', 'w') as f: f.write(content)
          "

      - name: Build
        run: pyinstaller watchnext.spec

      - name: Import certificates
        env:
          MACOS_CERT_P12: ${{ secrets.MACOS_CERT_P12 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
          MACOS_INSTALLER_CERT_P12: ${{ secrets.MACOS_INSTALLER_CERT_P12 }}
          MACOS_INSTALLER_CERT_PASSWORD: ${{ secrets.MACOS_INSTALLER_CERT_PASSWORD }}
        run: |
          echo "$MACOS_CERT_P12" | tr -d ' \n\r' | base64 --decode > cert.p12
          echo "$MACOS_INSTALLER_CERT_P12" | tr -d ' \n\r' | base64 --decode > installer_cert.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import cert.p12 -k build.keychain -P "$MACOS_CERT_PASSWORD" -T /usr/bin/codesign
          security import installer_cert.p12 -k build.keychain -P "$MACOS_INSTALLER_CERT_PASSWORD" -T /usr/bin/pkgbuild -T /usr/bin/productbuild
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain

      - name: Sign binary
        run: |
          APP_IDENTITY=$(security find-identity -v -p codesigning build.keychain | grep "Developer ID Application" | head -1 | awk '{print $2}')
          codesign --deep --force --verify --verbose \
            --sign "$APP_IDENTITY" \
            --options runtime \
            --entitlements entitlements.plist \
            dist/WatchNext

      - name: Build pkg
        run: |
          mkdir -p pkg_root/usr/local/bin
          cp dist/WatchNext pkg_root/usr/local/bin/watchnext
          pkgbuild \
            --root pkg_root \
            --identifier com.vahalia.watchnext \
            --version "${GITHUB_REF_NAME#v}" \
            --install-location / \
            WatchNext-unsigned.pkg

      - name: Sign pkg
        run: |
          INSTALLER_IDENTITY=$(security find-identity -v build.keychain | grep "Developer ID Installer" | head -1 | awk '{print $2}')
          productbuild \
            --sign "$INSTALLER_IDENTITY" \
            --package WatchNext-unsigned.pkg \
            WatchNext-mac.pkg

      - name: Notarize pkg
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool submit WatchNext-mac.pkg \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

      - name: Staple pkg
        run: xcrun stapler staple WatchNext-mac.pkg

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: WatchNext-mac.pkg
