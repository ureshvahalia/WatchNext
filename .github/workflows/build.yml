name: Build

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build
        run: pyinstaller watchnext.spec

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/WatchNext.exe

  build-macos-arm:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build
        run: pyinstaller watchnext.spec

      - name: Package
        run: zip -j dist/WatchNext-mac-arm.zip dist/WatchNext

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/WatchNext-mac-arm.zip

  build-macos-intel:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build
        run: pyinstaller watchnext.spec

      - name: Package
        run: zip -j dist/WatchNext-mac-intel.zip dist/WatchNext

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/WatchNext-mac-intel.zip
